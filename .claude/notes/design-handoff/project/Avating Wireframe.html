<script type="text/babel">



// ─── Wireframe Design Tokens ───────────────────────────────
const W = {
  bg: '#0a0e1a',
  bg1: '#0f1420',
  bg2: '#161c2c',
  bg3: '#1e2538',
  border: '#1f2638',
  borderHi: '#2a3349',
  text: '#e4e7ef',
  text2: '#a1a8bc',
  text3: '#6b7490',
  text4: '#434d67',
  brand: '#5170ff',
  brandSoft: 'rgba(81,112,255,0.12)',
  success: '#3fb950',
  warning: '#d29922',
  danger: '#f85149'
};

// ─── Primitive Wire Components ─────────────────────────────

function Screen({ children, style = {} }) {
  return (
    <div style={{
      background: W.bg,
      color: W.text,
      fontFamily: "'Inter', sans-serif",
      fontSize: 11,
      lineHeight: 1.5,
      overflow: 'hidden',
      position: 'relative',
      ...style
    }}>
      {children}
    </div>);

}

function Box({ children, style = {}, ...props }) {
  return <div style={{ background: W.bg2, border: `1px solid ${W.border}`, borderRadius: 6, ...style }} {...props}>{children}</div>;
}

function Label({ children, style = {}, color }) {
  return <div style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 9, color: color || W.text3, letterSpacing: '0.05em', textTransform: 'uppercase', ...style }}>{children}</div>;
}

function Heading({ children, style = {} }) {
  return <div style={{ fontFamily: "'Inter Tight', sans-serif", fontSize: 13, fontWeight: 600, color: W.text, ...style }}>{children}</div>;
}

function Sub({ children, style = {} }) {
  return <div style={{ fontSize: 10, color: W.text2, ...style }}>{children}</div>;
}

function Btn({ children, variant = 'primary', style = {} }) {
  const bg = variant === 'primary' ? W.brand : variant === 'secondary' ? W.bg3 : 'transparent';
  const border = variant === 'secondary' ? `1px solid ${W.borderHi}` : variant === 'ghost' ? `1px solid ${W.border}` : 'none';
  return (
    <div style={{
      background: bg, border, borderRadius: 6, padding: '5px 10px',
      fontFamily: "'Inter Tight', sans-serif", fontSize: 10, fontWeight: 500,
      color: variant === 'primary' ? '#fff' : W.text2,
      display: 'inline-flex', alignItems: 'center', gap: 4,
      cursor: 'pointer', ...style
    }}>{children}</div>);

}

function Input({ label, placeholder, style = {}, error, helper }) {
  return (
    <div style={{ display: 'flex', flexDirection: 'column', gap: 3, ...style }}>
      {label && <div style={{ fontSize: 10, color: error ? W.danger : W.text2, fontFamily: "'Inter Tight', sans-serif", fontWeight: 500 }}>{label}</div>}
      <div style={{ background: error ? 'rgba(248,81,73,0.06)' : W.bg3, border: `1px solid ${error ? W.danger : W.borderHi}`, borderRadius: 6, padding: '6px 8px', fontSize: 10, color: error ? W.danger : W.text3, position: 'relative' }}>
        {placeholder}
        {error && <span style={{ position: 'absolute', right: 8, top: '50%', transform: 'translateY(-50%)', fontSize: 10, color: W.danger }}>!</span>}
      </div>
      {error && <div style={{ fontSize: 8, color: W.danger, fontFamily: "'JetBrains Mono', monospace", display: 'flex', alignItems: 'center', gap: 3 }}><span>✕</span>{error}</div>}
      {helper && !error && <div style={{ fontSize: 8, color: W.text3, fontFamily: "'JetBrains Mono', monospace" }}>{helper}</div>}
    </div>
  );
}

// Inline alert banner for form-level errors
function FormAlert({ message }) {
  return (
    <div style={{ display: 'flex', gap: 6, alignItems: 'center', padding: '7px 10px', background: 'rgba(248,81,73,0.08)', border: `1px solid rgba(248,81,73,0.3)`, borderRadius: 6 }}>
      <span style={{ fontSize: 10, color: W.danger, flexShrink: 0 }}>✕</span>
      <div style={{ fontSize: 9, color: W.danger }}>{message}</div>
    </div>
  );
}

function Divider({ label, style = {} }) {
  return (
    <div style={{ display: 'flex', alignItems: 'center', gap: 8, ...style }}>
      <div style={{ flex: 1, height: 1, background: W.border }} />
      {label && <span style={{ fontSize: 9, color: W.text3 }}>{label}</span>}
      <div style={{ flex: 1, height: 1, background: W.border }} />
    </div>);

}

function Tag({ children, variant = 'default', style = {} }) {
  const bg = variant === 'brand' ? W.brandSoft : variant === 'success' ? 'rgba(63,185,80,0.1)' : W.bg3;
  const col = variant === 'brand' ? W.brand : variant === 'success' ? W.success : W.text2;
  return (
    <span style={{
      background: bg, border: `1px solid ${variant === 'brand' ? 'rgba(81,112,255,0.3)' : variant === 'success' ? 'rgba(63,185,80,0.3)' : W.border}`,
      borderRadius: 6, fontSize: 9, color: col,
      fontFamily: "'Inter Tight', sans-serif", fontWeight: 500, ...style, margin: "0px 0px 10px", padding: "2px 6px"
    }}>{children}</span>);

}

function AvatarMark({ initials, size = 24, online }) {
  return (
    <div style={{
      width: size, height: size, background: W.bg3,
      border: `1px solid ${W.borderHi}`, borderRadius: size > 28 ? 8 : '50%',
      display: 'flex', alignItems: 'center', justifyContent: 'center',
      fontFamily: "'Inter Tight', sans-serif", fontSize: size * 0.32, fontWeight: 600,
      color: W.text2, position: 'relative', flexShrink: 0
    }}>
      {initials}
      {online !== undefined &&
      <div style={{
        position: 'absolute', bottom: -1, right: -1, width: size * 0.28, height: size * 0.28,
        borderRadius: '50%', background: online ? W.success : W.text4,
        border: `1px solid ${W.bg}`
      }} />
      }
    </div>);

}

// Hexagon Radar Chart (SVG)
function HexRadar({ stats, labels, size = 120 }) {
  const cx = size / 2,cy = size / 2,r = size * 0.38;
  const n = 6;
  const angle = (i) => Math.PI / 2 + 2 * Math.PI * i / n * -1;
  const pt = (i, frac) => ({
    x: cx + r * frac * Math.cos(angle(i)),
    y: cy - r * frac * Math.sin(angle(i))
  });
  // grid lines
  const gridLevels = [0.33, 0.66, 1.0];
  const hexPath = (frac) => {
    return Array.from({ length: n }, (_, i) => {
      const p = pt(i, frac);
      return `${i === 0 ? 'M' : 'L'} ${p.x.toFixed(1)} ${p.y.toFixed(1)}`;
    }).join(' ') + ' Z';
  };
  const dataPath = () => {
    return stats.map((v, i) => {
      const p = pt(i, v / 100);
      return `${i === 0 ? 'M' : 'L'} ${p.x.toFixed(1)} ${p.y.toFixed(1)}`;
    }).join(' ') + ' Z';
  };
  return (
    <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`} style={{ flexShrink: 0 }}>
      {/* Grid */}
      {gridLevels.map((f, gi) =>
      <path key={gi} d={hexPath(f)} fill="none" stroke={W.border} strokeWidth="0.8" />
      )}
      {/* Spokes */}
      {Array.from({ length: n }, (_, i) => {
        const p = pt(i, 1);
        return <line key={i} x1={cx} y1={cy} x2={p.x} y2={p.y} stroke={W.border} strokeWidth="0.8" />;
      })}
      {/* Data fill */}
      <path d={dataPath()} fill={`rgba(81,112,255,0.15)`} stroke={W.brand} strokeWidth="1.5" />
      {/* Data dots */}
      {stats.map((v, i) => {
        const p = pt(i, v / 100);
        return <circle key={i} cx={p.x} cy={p.y} r="2.5" fill={W.brand} />;
      })}
      {/* Labels */}
      {labels.map((l, i) => {
        const p = pt(i, 1.22);
        return <text key={i} x={p.x} y={p.y} textAnchor="middle" dominantBaseline="middle" fontSize="7" fill={W.text3} fontFamily="'JetBrains Mono', monospace">{l}</text>;
      })}
    </svg>);

}

function ProgressBar({ value, style = {} }) {
  return (
    <div style={{ height: 3, background: W.bg3, borderRadius: 2, ...style }}>
      <div style={{ width: `${value}%`, height: '100%', background: W.brand, borderRadius: 2 }} />
    </div>);

}

function FlowArrow({ label }) {
  return (
    <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 4, flexShrink: 0 }}>
      <div style={{ width: 32, height: 1, background: W.borderHi, position: 'relative' }}>
        <div style={{ position: 'absolute', right: -4, top: -3, width: 0, height: 0, borderLeft: `6px solid ${W.borderHi}`, borderTop: '3px solid transparent', borderBottom: '3px solid transparent' }} />
      </div>
      {label && <div style={{ fontSize: 8, color: W.text3, whiteSpace: 'nowrap' }}>{label}</div>}
    </div>);

}

// Lucide-style SVG icons for sidebar
const SvgIcon = ({ path, size = 16, color = 'currentColor', strokeWidth = 1.5 }) => (
  <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth={strokeWidth} strokeLinecap="round" strokeLinejoin="round">
    {Array.isArray(path) ? path.map((d, i) => <path key={i} d={d} />) : <path d={path} />}
  </svg>
);

const ICONS = {
  // 대시보드 — LayoutDashboard
  dashboard: ["M3 3h7v7H3z", "M14 3h7v7h-7z", "M3 14h7v7H3z", "M14 14h7v7h-7z"],
  // 아바타 탐색 — Compass
  explore: "M12 2a10 10 0 1 0 0 20A10 10 0 0 0 12 2zm0 0v2m0 18v-2m10-10h-2M4 12H2m15.07-7.07-1.41 1.41M8.34 15.66l-1.41 1.41m11.14 0-1.41-1.41M8.34 8.34 6.93 6.93M16.24 12l-3.18 5.5L7 7l9.5 3.06-3.18 5.5",
  // 관전중 — Eye
  watch: ["M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7z", "M12 9a3 3 0 1 0 0 6 3 3 0 0 0 0-6z"],
  // 매칭 — Heart
  match: "M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z",
  // 실제 대화 — MessageSquare
  chat: ["M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"],
  // 내 아바타 — User
  avatar: ["M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2", "M12 3a4 4 0 1 0 0 8 4 4 0 0 0 0-8z"],
  // 다이아 — Gem
  gem: ["M6 3h12l4 6-10 13L2 9z", "M2 9h20", "M6 3l4 6m4 0 4-6", "M12 22V9"],
  // 설정 — Settings
  settings: ["M12 20a8 8 0 1 0 0-16 8 8 0 0 0 0 16z", "M12 14a2 2 0 1 0 0-4 2 2 0 0 0 0 4z", "M12 2v2m0 16v2M2 12h2m16 0h2m-3.5-7.5-1.4 1.4M6.9 17.1l-1.4 1.4m0-12.8 1.4 1.4m9.8 9.8 1.4 1.4"],
};

function SidebarIcon({ iconKey, active, badge }) {
  const color = active ? W.brand : W.text3;
  return (
    <div style={{ position: 'relative', display: 'flex', alignItems: 'center', justifyContent: 'center', width: 32, height: 32 }}>
      <SvgIcon path={ICONS[iconKey]} size={16} color={color} strokeWidth={active ? 2 : 1.5} />
      {badge && (
        <div style={{ position: 'absolute', top: 0, right: 0, background: W.brand, color: '#fff', fontSize: 7, fontWeight: 600, borderRadius: '50%', width: 12, height: 12, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>{badge}</div>
      )}
    </div>
  );
}

function Sidebar({ active = '탐색' }) {
  const items = [
    { key: 'dashboard', label: '대시보드', tooltip: '대시보드' },
    { key: 'explore',   label: '아바타 탐색', tooltip: '아바타 탐색' },
    { key: 'watch',     label: '관전중', tooltip: '관전중', badge: 2 },
    { key: 'match',     label: '매칭', tooltip: '연결 요청', badge: 1 },
    { key: 'chat',      label: '실제 대화', tooltip: '실제 대화' },
  ];
  const bottom = [
    { key: 'avatar',   label: '내 아바타', tooltip: '내 아바타' },
    { key: 'gem',      label: '다이아', tooltip: '다이아' },
    { key: 'settings', label: '설정', tooltip: '설정' },
  ];

  return (
    <div style={{ width: 56, background: W.bg, borderRight: `1px solid ${W.border}`, display: 'flex', flexDirection: 'column', alignItems: 'center', padding: '8px 0', flexShrink: 0, height: '100%' }}>
      <div style={{ padding: '4px 0 10px', fontFamily: "'Inter Tight', sans-serif", fontSize: 11, fontWeight: 600, color: W.brand }}>Av</div>
      {items.map((it) => (
        <div key={it.label} title={it.tooltip} style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', height: 38, width: 44, position: 'relative', background: it.label === active ? W.bg2 : 'transparent', borderRadius: 6, margin: '1px 0', cursor: 'pointer' }}>
          <SidebarIcon iconKey={it.key} active={it.label === active} badge={it.badge} />
        </div>
      ))}
      <div style={{ flex: 1 }} />
      {bottom.map((it) => (
        <div key={it.label} title={it.tooltip} style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', height: 36, width: 44, cursor: 'pointer' }}>
          <SidebarIcon iconKey={it.key} active={false} />
        </div>
      ))}
      <div style={{ height: 8 }} />
      <AvatarMark initials="HW" size={22} />
      <div style={{ height: 8 }} />
    </div>
  );
}

function Header({ breadcrumb, style = {} }) {
  return (
    <div style={{ height: 40, background: W.bg, borderBottom: `1px solid ${W.border}`, display: 'flex', alignItems: 'center', padding: '0 12px', gap: 8, ...style }}>
      <Sub style={{ flex: 1 }}>{breadcrumb}</Sub>
      <div style={{ display: 'flex', gap: 4, alignItems: 'center' }}>
        <div style={{ background: W.bg2, border: `1px solid ${W.border}`, borderRadius: 6, padding: '3px 8px', fontSize: 9, color: W.text3, fontFamily: "'JetBrains Mono', monospace" }}>⌘K</div>
        <div style={{ padding: '3px 6px', borderRadius: 6, border: `1px solid ${W.border}`, fontSize: 9, color: W.brand, display: 'flex', gap: 2 }}>◇ 1,240</div>
        <div style={{ width: 20, height: 20, borderRadius: '50%', background: W.bg2, border: `1px solid ${W.border}`, display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 9, color: W.text3 }}>🔔</div>
      </div>

// S02b · Service Intro
function ScreenServiceIntro() {
  const features = [

function ScreenAvatarConfirm() {
  const initStats = [72, 45, 58, 65, 80, 53];
  const labels = ['공감', '적극성', '유머', '감성', '경청', '표현력'];
  const [stats, setStats] = React.useState(initStats);
  const [tuneCount, setTuneCount] = React.useState(0);
  const [activeStat, setActiveStat] = React.useState(null); // index of stat being tuned
  const [toast, setToast] = React.useState(false);
  const MAX_TUNE = 3;

  const surveyMap = {
    0: { q: '상대방 감정에 얼마나 잘 공감하나요?', opts: ['매우 잘 공감', '보통', '잘 못 공감'] },
    1: { q: '대화에서 먼저 행동하는 편인가요?', opts: ['항상 먼저', '상황에 따라', '상대방 따라'] },
    2: { q: '유머를 얼마나 자주 활용하나요?', opts: ['자주 사용', '가끔', '거의 안 함'] },
    3: { q: '감성적인 표현을 자주 하나요?', opts: ['매우 자주', '보통', '거의 안 함'] },
    4: { q: '상대방 말을 얼마나 잘 경청하나요?', opts: ['매우 집중', '보통', '자주 놓침'] },
    5: { q: '자신의 생각을 잘 표현하나요?', opts: ['매우 잘함', '보통', '표현 어려움'] },
  };

  const showToast = () => {
    setToast(true);
    setTimeout(() => setToast(false), 2000);
  };

  const handleStatClick = (i) => {
    if (tuneCount >= MAX_TUNE) { showToast(); return; }
    setActiveStat(i);
  };

  const handleAnswer = (optIdx) => {
    const delta = optIdx === 0 ? 10 : optIdx === 1 ? 0 : -10;
    setStats(prev => prev.map((v, i) => i === activeStat ? Math.min(100, Math.max(10, v + delta)) : v));
    setTuneCount(c => c + 1);
    setActiveStat(null);
  };

  return (
    <Screen style={{ width: 360, height: 460, position: 'relative' }}>
      <div style={{ padding: 20, display: 'flex', flexDirection: 'column', height: '100%' }}>
        <div style={{ display: 'flex', gap: 3, marginBottom: 16, width: '100%' }}>
          {[1, 1, 1, 1].map((a, i) =>
          <div key={i} style={{ flex: 1, height: 2, background: W.brand, borderRadius: 1 }} />
          )}
        </div>
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 2 }}>
          <Label>STEP 4 / 4 · 아바타 확인</Label>
          <div style={{ display: 'flex', gap: 3 }}>
            {Array.from({ length: MAX_TUNE }).map((_, i) => (
              <div key={i} style={{ width: 6, height: 6, borderRadius: '50%', background: i < tuneCount ? W.brand : W.bg3, border: `1px solid ${W.borderHi}` }} />
            ))}
            <Label color={tuneCount >= MAX_TUNE ? W.danger : W.text3} style={{ marginLeft: 3 }}>{tuneCount}/{MAX_TUNE}</Label>
          </div>
        </div>
        <Heading style={{ fontSize: 13, marginBottom: 2 }}>생성된 아바타를 확인하세요</Heading>
        <Sub style={{ fontSize: 9, marginBottom: 10, color: W.text2 }}>마음에 안드는 스탯을 눌러서 관련된 스탯을 재조정해보세요.</Sub>
        {/* Profile */}
        <Box style={{ padding: 10, display: 'flex', gap: 10, alignItems: 'center', marginBottom: 10 }}>
          <AvatarMark initials="HW" size={36} />
          <div>
            <Heading style={{ fontSize: 11, marginBottom: 3 }}>hyunwoo</Heading>
            <div style={{ display: 'flex', gap: 4 }}>
              <Tag>내향 · 분석형</Tag>
              <Tag variant="brand">Lv.1</Tag>
            </div>
          </div>
        </Box>
        {/* Stats — clickable */}
        <Box style={{ padding: 12, display: 'flex', gap: 12, alignItems: 'center', flex: 1 }}>
          <HexRadar stats={stats} labels={labels} size={110} />
          <div style={{ flex: 1 }}>
            {labels.map((l, i) => (
              <div
                key={l}
                onClick={() => handleStatClick(i)}
                style={{
                  display: 'flex', alignItems: 'center', gap: 6, marginBottom: 5,
                  padding: '3px 5px', borderRadius: 5,
                  background: activeStat === i ? W.brandSoft : 'transparent',
                  border: `1px solid ${activeStat === i ? 'rgba(81,112,255,0.4)' : 'transparent'}`,
                  cursor: tuneCount >= MAX_TUNE ? 'not-allowed' : 'pointer',
                  transition: 'background 0.15s',
                }}
              >
                <Label style={{ width: 36 }}>{l}</Label>
                <ProgressBar value={stats[i]} style={{ flex: 1 }} />
                <Label color={W.text2}>{stats[i]}</Label>
                <div style={{ fontSize: 8, color: W.text4 }}>✎</div>

        </Box>
        <div style={{ display: 'flex', gap: 4, flexWrap: 'wrap', marginTop: 8, marginBottom: 12 }}>
          {['독립서점', '심야 카페', '영화', '산책'].map((t) => <Tag key={t} style={{ fontSize: 8 }}>{t}</Tag>)}

        <Btn style={{ width: '100%', justifyContent: 'center' }}>시작하기</Btn>
        <div style={{ fontSize: 8, color: W.text3, textAlign: 'center', marginTop: 5 }}>확정 이후 스탯은 튜닝 기능을 통해 조정할 수 있습니다</div>
      </div>

      {/* Mini survey overlay */}
      {activeStat !== null && (
        <div style={{ position: 'absolute', inset: 0, background: 'rgba(10,14,26,0.7)', display: 'flex', alignItems: 'flex-end', borderRadius: 0 }}>
          <div style={{ width: '100%', background: W.bg1, border: `1px solid ${W.borderHi}`, borderRadius: '10px 10px 0 0', padding: 16 }}>
            <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 10 }}>
              <Label color={W.brand}>{labels[activeStat]} 재조정</Label>

              <div style={{ width: `${s.val}%`, height: '100%', background: s.color, borderRadius: 2 }} />
            </div>
            <div style={{ fontSize: 8, color: s.color, fontFamily: 'monospace' }}>{s.msg}</div>
          </div>
        ))}
      </div>

      {/* Checkbox states */}
      <Label style={{ marginBottom: 8 }}>CHECKBOX STATES</Label>
      <div style={{ display: 'flex', flexDirection: 'column', gap: 6, marginBottom: 18 }}>
        <div style={{ display: 'flex', gap: 6, alignItems: 'center' }}>

        </div>
        <div style={{ display: 'flex', gap: 6, alignItems: 'center' }}>
          <div style={{ width: 14, height: 14, borderRadius: 3, border: `1px solid ${W.borderHi}`, background: W.bg2 }} />
          <Sub style={{ fontSize: 9 }}>미선택 (unchecked)</Sub>
        </div>
        <div style={{ display: 'flex', gap: 6, alignItems: 'center' }}>
          <div style={{ width: 14, height: 14, borderRadius: 3, border: `1.5px solid ${W.danger}`, background: 'rgba(248,81,73,0.06)' }} />
          <div style={{ fontSize: 9, color: W.danger }}>필수 항목입니다</div>
        </div>
      </div>

      {/* Form-level alert */}
      <Label style={{ marginBottom: 8 }}>FORM ALERT</Label>
      <div style={{ display: 'flex', flexDirection: 'column', gap: 6 }}>
        <FormAlert message="이미 가입된 이메일입니다" />
        <div style={{ display: 'flex', gap: 6, alignItems: 'center', padding: '7px 10px', background: 'rgba(63,185,80,0.08)', border: `1px solid rgba(63,185,80,0.3)`, borderRadius: 6 }}>

          <div style={{ fontSize: 9, color: W.success }}>닉네임을 사용할 수 있습니다</div>
        </div>
      </div>
    </Screen>
  );
}

// ── Toast Component ──────────────────────────────────────────
function ScreenToasts() {

    { type: 'error',   bg: 'rgba(248,81,73,0.12)',  border: 'rgba(248,81,73,0.35)',  icon: '✕', color: W.danger,  title: '다이아가 부족합니다',             sub: '충전 후 이용해주세요' },
    { type: 'warning', bg: 'rgba(210,153,34,0.12)', border: 'rgba(210,153,34,0.35)', icon: '!', color: W.warning, title: '인증번호가 일치하지 않습니다',     sub: '다시 확인해주세요' },
    { type: 'warning', bg: 'rgba(210,153,34,0.12)', border: 'rgba(210,153,34,0.35)', icon: '!', color: W.warning, title: '더 이상 조정할 수 없습니다',       sub: '최대 3회까지 가능합니다' },
    { type: 'success', bg: 'rgba(63,185,80,0.12)',  border: 'rgba(63,185,80,0.35)',  icon: '✓', color: W.success, title: '아바타가 생성됐습니다',           sub: '탐색을 시작해보세요' },
    { type: 'success', bg: 'rgba(63,185,80,0.12)',  border: 'rgba(63,185,80,0.35)',  icon: '✓', color: W.success, title: '연결 요청을 보냈습니다',           sub: '상대방 수락을 기다립니다' },
    { type: 'info',    bg: W.brandSoft,              border: 'rgba(81,112,255,0.35)', icon: 'i', color: W.brand,   title: '호감도 임계값에 근접했습니다',     sub: 'TURN 11 · 호감도 72' },
  ];
  return (
    <Screen style={{ width: 320, height: 480, padding: 20, overflow: 'auto' }}>
      <Heading style={{ fontSize: 13, marginBottom: 4 }}>토스트 알림</Heading>
      <Sub style={{ fontSize: 9, marginBottom: 14 }}>화면 우하단 고정 · 3초 후 자동 소멸</Sub>
      <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
        {toasts.map((t, i) => (
          <div key={i} style={{ display: 'flex', gap: 8, alignItems: 'flex-start', padding: '8px 10px', background: t.bg, border: `1px solid ${t.border}`, borderRadius: 6 }}>
            <div style={{ width: 16, height: 16, borderRadius: '50%', background: t.bg, border: `1.5px solid ${t.color}`, display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 8, color: t.color, fontWeight: 600, flexShrink: 0, marginTop: 1 }}>{t.icon}</div>
            <div style={{ flex: 1, minWidth: 0 }}>
              <div style={{ fontFamily: "'Inter Tight', sans-serif", fontSize: 10, fontWeight: 500, color: W.text, marginBottom: 1 }}>{t.title}</div>
              <div style={{ fontSize: 8, color: W.text3 }}>{t.sub}</div>
            </div>
            <div style={{ fontSize: 9, color: W.text4, cursor: 'pointer', flexShrink: 0 }}>✕</div>
          </div>
        ))}
      </div>
      {/* Position hint */}
      <Box style={{ padding: '8px 10px', marginTop: 14 }}>
        <Label style={{ marginBottom: 4 }}>표시 위치</Label>
        <div style={{ position: 'relative', height: 60, background: W.bg, borderRadius: 4, border: `1px solid ${W.border}` }}>
          <div style={{ position: 'absolute', bottom: 6, right: 6, background: W.bg2, border: `1px solid ${W.border}`, borderRadius: 4, padding: '3px 7px', fontSize: 8, color: W.text3 }}>toast</div>
        </div>
        <Sub style={{ fontSize: 8, marginTop: 4 }}>우하단 고정 · z-index 최상위</Sub>
      </Box>
    </Screen>
  );
}
